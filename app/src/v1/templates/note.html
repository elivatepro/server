<!DOCTYPE HTML>
<!-- build: footer-static-2 -->
<html TEMPLATE_HTML>
<head>
    <meta charset='utf-8'>
    <!-- Notes are end-to-end encrypted and decrypted with window.crypto.subtle,
         which only exists in a secure context (HTTPS). If this page was opened
         over http://, upgrade to https FIRST, preserving the #key fragment, so
         decryption can run. Without this the note renders blank on http. -->
    <script>
      if (location.protocol === 'http:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        location.replace('https:' + location.href.substring(location.protocol.length));
      }
    </script>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>TEMPLATE_TITLE</title>
    TEMPLATE_OG_TITLE
    TEMPLATE_META_DESCRIPTION
    <meta property='og:type' content='article'>
    <meta property='og:site_name' content='Boko OS'>
    <meta property='og:image' content='TEMPLATE_OG_IMAGE'>
    <meta name='twitter:card' content='summary_large_image'>
    <meta name='twitter:image' content='TEMPLATE_OG_IMAGE'>
    <meta name='theme-color' content='#f2784b'>
    <link rel='icon' type='image/png' sizes='32x32' href='/favicon-32x32.png'>
    <link rel='icon' type='image/png' sizes='16x16' href='/favicon-16x16.png'>
    <link rel='apple-touch-icon' sizes='180x180' href='/apple-touch-icon.png'>
    <link rel='manifest' href='/site.webmanifest'>
    <style>
        TEMPLATE_WIDTH
    </style>
    <link rel='stylesheet' href='TEMPLATE_CSS'>
    <link rel='stylesheet' href='TEMPLATE_ASSETS_WEBROOT/global-note-styles.css'>
    <script src='TEMPLATE_ASSETS_WEBROOT/app.js'></script>
    TEMPLATE_SCRIPTS
</head>
<body TEMPLATE_BODY>
<div class='app-container'>
    <div class='horizontal-main-container'>
        <div class='workspace'>
            <div class='workspace-split mod-vertical mod-root'>
                <div class='workspace-leaf mod-active'>
                    <div class='workspace-leaf-content'>
                        <div class='view-content'>
                            <div class='markdown-reading-view' style='width:100%;'>
                                <div TEMPLATE_PREVIEW>
                                    <div class='markdown-preview-sizer markdown-preview-section'>
                                        <div TEMPLATE_PUSHER></div>
                                        TEMPLATE_NOTE_CONTENT
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class='status-bar' style='display:flex;'>
        <div class='status-bar-item'>
            <span class='status-bar-item-segment'><a href='https://bokoisaac.pro' target='_blank' style='display:inline-flex;align-items:center;gap:6px;'><img src='/brand-logo.png' alt='Boko OS' style='height:16px;width:auto;vertical-align:middle;'>Boko OS</a></span>
            <span id='theme-mode-toggle' class='status-bar-item-segment'>🌓</span>
        </div>
    </div>
</div>
TEMPLATE_ENCRYPTED_DATA

</html>
